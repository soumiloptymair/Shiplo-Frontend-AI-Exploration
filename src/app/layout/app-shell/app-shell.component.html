<main class="h-screen w-full overflow-hidden p-2" style="background-color: var(--grey-02)">
  <div class="mx-auto flex h-[calc(100vh-1rem)] w-full items-stretch gap-2">
    <!-- Sidebar -->
    <div
      class="shrink-0 transition-all duration-200"
      [ngClass]="isCollapsed() ? 'w-[60px]' : 'w-[208px]'"
    >
      <app-nav-sidebar
        [isCollapsed]="isCollapsed()"
        (toggleCollapse)="isCollapsed.set(!isCollapsed())"
      />
    </div>

    <!-- Content slot -->
    <div class="min-w-0 flex-1 overflow-hidden">
      <ng-content />
    </div>

    <!-- Optional right-hand panel slot (independent sibling card) -->
    <ng-content select="[appShellPanel]" />
  </div>
</main>
