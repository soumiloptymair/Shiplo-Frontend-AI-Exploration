<!-- Title bar — Figma `25750:53549` -->
<header class="flex h-[68px] shrink-0 items-center justify-between border-b border-divider px-5 py-4"
  data-testid="label-header">
  <h2 class="font-heading text-[24px] font-medium leading-[1.4] tracking-[0.15px] text-fg-primary">
    Label
  </h2>

  <div class="flex items-center gap-4">
    <label class="relative flex h-9 w-[280px] items-center gap-2 rounded border border-divider bg-surface py-1 pl-3 pr-2">
      <svg class="h-5 w-5 shrink-0 text-fg-secondary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 100-15 7.5 7.5 0 000 15z"/>
      </svg>
      <input type="search"
        placeholder="Search"
        [value]="svc.query()"
        (input)="onSearch($any($event.target).value)"
        data-testid="input-label-search"
        class="min-w-0 flex-1 bg-transparent text-[14px] leading-[1.43] text-fg-primary outline-none placeholder:text-[#45565b]"/>
    </label>

    <button type="button"
      (click)="openCreate()"
      data-testid="button-add-reference"
      class="inline-flex h-9 shrink-0 items-center rounded-md bg-action-primary px-3 text-[14px] font-bold text-fg-on-action transition-colors hover:bg-action-primary-hover">
      Add Reference
    </button>
  </div>
</header>

<!-- Body — Figma `25750:53553` -->
<div class="flex min-h-0 flex-1 flex-col overflow-hidden px-5 pb-8 pt-4">
  <div class="flex shrink-0 flex-col gap-1">
    <h3 class="font-body text-[14px] font-medium uppercase leading-[1.43] text-fg-primary"
      data-testid="section-label-references">
      Label References
    </h3>
    <p class="font-body text-[12px] leading-[1.43] text-[#72777e]">
      Define references to be added as custom fields to shipping labels
    </p>
  </div>

  <div class="data-grid data-grid--scroll mt-4 min-h-0 flex-1" data-testid="table-label-references">
    <div class="data-grid__header"
      style="grid-template-columns: minmax(200px, max-content) minmax(280px, 1fr) minmax(130px, max-content) 44px;">
      <span class="data-grid__header-cell" data-testid="header-reference-name">Reference Name</span>
      <span class="data-grid__header-cell" data-testid="header-reference-description">Description</span>
      <span class="data-grid__header-cell" aria-hidden="true"></span>
      <span class="data-grid__header-cell" aria-hidden="true"></span>
    </div>

    <div class="data-grid__body">
    <div *ngIf="svc.filtered().length === 0"
      class="data-grid__empty"
      data-testid="empty-label-references">
      {{ svc.query() ? 'No references match your search.' : 'No label references yet.' }}
    </div>

    <ul>
      <li *ngFor="let row of svc.filtered(); trackBy: trackById"
        class="data-grid__row"
        [attr.data-testid]="'row-label-' + row.id"
        style="grid-template-columns: minmax(200px, max-content) minmax(280px, 1fr) minmax(130px, max-content) 44px;">
        <span class="data-grid__cell"
          [attr.data-testid]="'cell-reference-name-' + row.id">{{ row.name }}</span>
        <span class="data-grid__cell"
          [attr.data-testid]="'cell-reference-description-' + row.id">{{ row.description }}</span>

        <span class="data-grid__cell">
          <button type="button"
            role="switch"
            [attr.aria-checked]="row.enabled"
            [attr.aria-label]="row.enabled ? 'Disable ' + row.name : 'Enable ' + row.name"
            (click)="toggleEnabled(row.id)"
            [attr.data-testid]="'toggle-label-' + row.id"
            class="relative ml-auto inline-flex h-5 w-9 items-center rounded-full transition-colors"
            [ngClass]="row.enabled ? 'bg-action-primary' : 'bg-neutral-400'">
            <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
              [ngClass]="row.enabled ? 'translate-x-[18px]' : 'translate-x-0.5'"></span>
          </button>
        </span>

        <div class="data-grid__cell data-grid__cell--actions relative">
          <button *ngIf="!row.isSystem"
            type="button"
            (click)="toggleMenu(row.id, $event)"
            aria-label="Row actions"
            aria-haspopup="menu"
            [attr.aria-expanded]="openMenuId() === row.id"
            [attr.data-testid]="'menu-label-' + row.id"
            class="flex h-7 w-7 items-center justify-center rounded-full text-fg-secondary hover:bg-surface-light-primary">
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="5" r="1.5"/>
              <circle cx="12" cy="12" r="1.5"/>
              <circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
        </div>
      </li>
    </ul>
    </div>
  </div>
</div>

<!-- Row actions menu — fixed so it is not clipped by the table scroll frame -->
<div *ngIf="openMenuRow() as row"
  (click)="$event.stopPropagation()"
  class="fixed z-50 w-48 rounded-token border border-divider bg-surface py-1 shadow-lg"
  role="menu"
  [style.top.px]="menuPosition()?.top"
  [style.left.px]="menuPosition()?.left"
  [attr.data-testid]="'menu-label-popup-' + row.id">
  <ng-container *ngIf="pendingDeleteId() !== row.id; else inlineConfirm">
    <button type="button"
      role="menuitem"
      (click)="openEdit(row, $event)"
      [attr.data-testid]="'menu-label-edit-' + row.id"
      class="flex w-full items-center px-3 py-1.5 text-left text-[13px] text-fg-primary hover:bg-surface-light-primary">
      Edit
    </button>
    <button type="button"
      role="menuitem"
      (click)="startDelete(row.id, $event)"
      [attr.data-testid]="'menu-label-delete-' + row.id"
      class="flex w-full items-center px-3 py-1.5 text-left text-[13px] text-fg-negative hover:bg-surface-light-primary">
      Delete
    </button>
  </ng-container>
  <ng-template #inlineConfirm>
    <div class="flex flex-col gap-2 px-3 py-2"
      [attr.data-testid]="'inline-confirm-delete-label-' + row.id">
      <p class="text-[12px] leading-[1.4] text-fg-primary">
        Delete <span class="font-medium">{{ row.name }}</span>?
      </p>
      <div class="flex justify-end gap-2">
        <button type="button"
          (click)="cancelDelete(); $event.stopPropagation()"
          [attr.data-testid]="'button-cancel-delete-label-' + row.id"
          class="h-7 rounded-token border border-divider bg-surface px-2 text-[12px] font-medium text-fg-primary hover:bg-surface-light-primary">
          Cancel
        </button>
        <button type="button"
          (click)="confirmDelete(); $event.stopPropagation()"
          [attr.data-testid]="'button-confirm-delete-label-' + row.id"
          class="h-7 rounded-token bg-status-error px-2 text-[12px] font-medium text-fg-on-action hover:opacity-90">
          Delete
        </button>
      </div>
    </div>
  </ng-template>
</div>

<app-reference-modal *ngIf="modalOpen()"
  [initialReference]="editing()"
  (save)="onSave($event)"
  (cancel)="closeModal()" />
