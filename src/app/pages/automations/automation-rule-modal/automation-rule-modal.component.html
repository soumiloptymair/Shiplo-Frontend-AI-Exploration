<!--
  Add / Edit Automation Rule modal.
  Pixel-faithful to Figma file `unEpC0FcuWKbB5yO1m7OyX`, node `23008:79716`.
  Dialog: white, rounded 8px, shadow 0 1px 16px rgba(0,0,0,0.25), width 935px.
  Header: 24px / 16px padding, bottom 1px divider #e4eaed, title Roboto SemiBold 18px.
  Content: bg #f6f9fb, h 542px, 24px horizontal padding, two 400px columns separated by
  a 1px vertical divider with a 55px white arrow circle at the vertical midpoint.
  Each column has a Match-All/Any pill toggle (right column toggle is invisible filler
  to preserve alignment), a section header, a white inner card (rounded 4px, 12px pad)
  containing two 40px selects on row 1 and a full-width 40px Value select on row 2,
  followed by a 20px dashed vertical divider and a 24px square teal [+] button.
-->
<div
  class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-black/40 p-8"
  (click)="onCancel()"
  data-testid="modal-automation-backdrop">
  <div
    class="my-auto w-[935px] max-w-[95vw] overflow-hidden rounded-lg bg-white shadow-[0_1px_16px_rgba(0,0,0,0.25)]"
    (click)="$event.stopPropagation(); closePicker()"
    role="dialog"
    aria-modal="true"
    data-testid="modal-automation-rule">

    <!-- ============ Dialog header ============ -->
    <header class="flex items-center justify-between border-b border-[#e4eaed] px-6 py-4">
      <h2 class="font-body text-[18px] font-semibold leading-[1.43] text-[#0b1516]"
        data-testid="text-modal-title">
        {{ isEdit() ? 'Edit Automation Rule' : 'Add Automation Rule' }}
      </h2>
      <button
        type="button"
        (click)="onCancel()"
        aria-label="Close"
        data-testid="button-close-modal"
        class="flex h-8 w-8 items-center justify-center rounded-full text-[#45565b] hover:bg-[#f6f9fb]">
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <!-- ============ Content: 24px L/R padding, two equal columns over #f6f9fb ============ -->
    <div class="relative flex h-[542px] items-start gap-4 overflow-y-auto bg-[#f6f9fb] px-6 pb-6">
      <!-- Vertical center divider (1px) -->
      <div class="pointer-events-none absolute inset-y-0 left-1/2 w-px -translate-x-1/2 bg-[#e4eaed]"></div>

      <!-- Center → arrow circle (55px, white, shadow) -->
      <div class="pointer-events-none absolute left-1/2 top-1/2 z-10 flex h-[55px] w-[55px] -translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-full bg-white shadow-[0_2px_8px_rgba(11,21,22,0.08)]">
        <svg class="h-5 w-5 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </div>

      <!-- ===== LEFT column: IF conditions ===== -->
      <section class="flex min-w-0 flex-1 flex-col items-center gap-5 py-5" data-testid="section-conditions">
        <!-- Match All / Match Any pill toggle (Figma: 24px tall, rounded-20px, bg white, border #e4eaed) -->
        <div class="inline-flex h-6 items-center rounded-[20px] border border-[#e4eaed] bg-white p-[2px]"
          data-testid="toggle-match">
          <button
            type="button"
            (click)="conditionMatch.set('all')"
            [attr.aria-pressed]="conditionMatch() === 'all'"
            data-testid="toggle-match-all"
            class="flex h-full items-center justify-center rounded-[16px] px-2 py-[5px] text-[14px] leading-none transition-colors"
            [ngClass]="conditionMatch() === 'all' ? 'bg-[rgba(0,133,114,0.08)] font-medium text-[#008572]' : 'font-normal text-[#45565b]'">
            Match All
          </button>
          <button
            type="button"
            (click)="conditionMatch.set('any')"
            [attr.aria-pressed]="conditionMatch() === 'any'"
            data-testid="toggle-match-any"
            class="flex h-full items-center justify-center rounded-[16px] px-2 py-[5px] text-[14px] leading-none transition-colors"
            [ngClass]="conditionMatch() === 'any' ? 'bg-[rgba(0,133,114,0.08)] font-medium text-[#008572]' : 'font-normal text-[#45565b]'">
            Match Any
          </button>
        </div>

        <!-- Section header -->
        <div class="flex items-center gap-2">
          <svg class="h-5 w-5 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
            <circle cx="12" cy="12" r="9"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4M12 16h.01"/>
          </svg>
          <span class="font-body text-[18px] font-medium leading-[1.43] text-[#0b1516]">If this is true</span>
        </div>

        <!-- Condition rows + add button -->
        <div class="flex w-full flex-col items-center">
          <ng-container *ngFor="let cond of conditions(); let i = index; trackBy: trackById">
            <!-- White inner card (rounded 4px, 12px padding, 12px gap) -->
            <div class="relative mb-2 flex w-full flex-col gap-3 rounded-[4px] bg-white p-3"
              [attr.data-testid]="'condition-row-' + i">
              <!-- Row 1: Parameter + Condition (both 40px tall) -->
              <div class="flex items-center gap-3">
                <!-- Parameter select -->
                <div class="relative flex-1">
                  <button type="button"
                    (click)="togglePicker('c' + i + ':field', $event)"
                    [attr.data-testid]="'button-condition-field-' + i"
                    class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 py-2 text-left">
                    <span class="flex-1 truncate text-[14px] leading-[1.43]"
                      [ngClass]="conditionField(cond.fieldKey)?.label ? 'text-[#0b1516]' : 'text-[#7f9199]'">
                      {{ conditionField(cond.fieldKey)?.label || 'Parameter' }}
                    </span>
                    <svg class="h-5 w-5 shrink-0 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M7 10l5 5 5-5z"/>
                    </svg>
                  </button>
                  <div *ngIf="openPicker() === 'c' + i + ':field'"
                    class="absolute left-0 top-11 z-20 w-full rounded-[4px] border border-[#e4eaed] bg-white p-2 shadow-lg"
                    (click)="$event.stopPropagation()"
                    data-testid="dropdown-condition-field">
                    <div class="mb-2 flex items-center gap-2 rounded-[4px] border border-[#e4eaed] px-2">
                      <svg class="h-3.5 w-3.5 text-[#7f9199]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
                      <input
                        type="text"
                        placeholder="Search..."
                        [value]="pickerSearch()"
                        (input)="pickerSearch.set($any($event.target).value)"
                        class="h-8 w-full bg-transparent text-[14px] text-[#0b1516] outline-none"/>
                    </div>
                    <ul class="max-h-64 overflow-y-auto">
                      <li *ngFor="let f of filteredFields(CONDITION_FIELDS)">
                        <button type="button"
                          (click)="setConditionField(i, f.key)"
                          class="flex w-full items-center px-2 py-1.5 text-left text-[14px] text-[#0b1516] hover:bg-[#f6f9fb]">
                          {{ f.label }}
                        </button>
                      </li>
                    </ul>
                  </div>
                </div>

                <!-- Condition (operator) select -->
                <div class="relative flex-1">
                  <button type="button"
                    [disabled]="!cond.fieldKey"
                    (click)="togglePicker('c' + i + ':op', $event)"
                    [attr.data-testid]="'button-condition-op-' + i"
                    class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 py-2 text-left disabled:cursor-not-allowed disabled:opacity-50">
                    <span class="flex-1 truncate text-[14px] leading-[1.43]"
                      [ngClass]="cond.fieldKey ? 'text-[#0b1516]' : 'text-[#7f9199]'">
                      {{ cond.fieldKey ? OPERATORS[cond.operator].label : 'Condition' }}
                    </span>
                    <svg class="h-5 w-5 shrink-0 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M7 10l5 5 5-5z"/>
                    </svg>
                  </button>
                  <div *ngIf="openPicker() === 'c' + i + ':op' && cond.fieldKey"
                    class="absolute left-0 top-11 z-20 w-full rounded-[4px] border border-[#e4eaed] bg-white py-1 shadow-lg"
                    (click)="$event.stopPropagation()">
                    <button *ngFor="let opKey of conditionField(cond.fieldKey)?.operators"
                      type="button"
                      (click)="setConditionOperator(i, opKey)"
                      class="flex w-full items-center px-3 py-1.5 text-left text-[14px] text-[#0b1516] hover:bg-[#f6f9fb]">
                      {{ OPERATORS[opKey].label }}
                    </button>
                  </div>
                </div>
              </div>

              <!-- Row 2: Value (full-width 40px) + remove button -->
              <div class="flex items-center gap-2">
                <div class="relative flex-1">
                  <!-- Number input -->
                  <ng-container *ngIf="conditionField(cond.fieldKey)?.valueKind === 'number'">
                    <div class="flex h-10 items-center rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2">
                      <input
                        type="number"
                        [value]="cond.value ?? ''"
                        (input)="onNumberInput(i, $any($event.target).value)"
                        placeholder="Value"
                        class="h-full w-full bg-transparent text-[14px] text-[#0b1516] outline-none placeholder:text-[#7f9199]"
                        [attr.data-testid]="'input-condition-value-' + i"/>
                      <span *ngIf="conditionField(cond.fieldKey)?.unit" class="ml-2 text-[14px] text-[#7f9199]">{{ conditionField(cond.fieldKey)?.unit }}</span>
                    </div>
                  </ng-container>

                  <!-- Text input -->
                  <ng-container *ngIf="conditionField(cond.fieldKey)?.valueKind === 'text'">
                    <input
                      type="text"
                      [value]="cond.value ?? ''"
                      (input)="setConditionValue(i, $any($event.target).value)"
                      placeholder="Value"
                      class="h-10 w-full rounded-[4px] border border-[#e4eaed] bg-white px-3 text-[14px] text-[#0b1516] outline-none placeholder:text-[#7f9199]"
                      [attr.data-testid]="'input-condition-value-' + i"/>
                  </ng-container>

                  <!-- Boolean toggle -->
                  <ng-container *ngIf="conditionField(cond.fieldKey)?.valueKind === 'boolean'">
                    <div class="flex h-10 items-center gap-3 rounded-[4px] border border-[#e4eaed] bg-white px-3">
                      <label class="flex items-center gap-2 text-[14px] text-[#0b1516]">
                        <input type="radio" [name]="'b'+i" [checked]="cond.value === true" (change)="setConditionValue(i, true)"/> True
                      </label>
                      <label class="flex items-center gap-2 text-[14px] text-[#0b1516]">
                        <input type="radio" [name]="'b'+i" [checked]="cond.value === false" (change)="setConditionValue(i, false)"/> False
                      </label>
                    </div>
                  </ng-container>

                  <!-- Select / Region -->
                  <ng-container *ngIf="conditionField(cond.fieldKey)?.valueKind === 'select' || conditionField(cond.fieldKey)?.valueKind === 'region'">
                    <button type="button"
                      (click)="togglePicker('c' + i + ':val', $event)"
                      [attr.data-testid]="'button-condition-value-' + i"
                      class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 text-left">
                      <span class="flex-1 truncate text-[14px] leading-[1.43]"
                        [ngClass]="cond.value ? 'text-[#0b1516]' : 'text-[#7f9199]'">
                        <span *ngIf="conditionField(cond.fieldKey)?.valueKind === 'region' && cond.value" class="mr-1 text-base leading-none">🇺🇸</span>{{ valueDisplay(cond.value) }}
                      </span>
                      <svg class="h-5 w-5 shrink-0 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 10l5 5 5-5z"/>
                      </svg>
                    </button>
                    <div *ngIf="openPicker() === 'c' + i + ':val'"
                      class="absolute left-0 top-11 z-20 max-h-64 w-full overflow-y-auto rounded-[4px] border border-[#e4eaed] bg-white py-1 shadow-lg"
                      (click)="$event.stopPropagation()">
                      <button *ngFor="let opt of conditionField(cond.fieldKey)?.options"
                        type="button"
                        (click)="pickConditionValue(i, opt)"
                        class="flex w-full items-center px-3 py-1.5 text-left text-[14px] text-[#0b1516] hover:bg-[#f6f9fb]">
                        {{ opt }}
                      </button>
                    </div>
                  </ng-container>

                  <!-- Multi-select -->
                  <ng-container *ngIf="conditionField(cond.fieldKey)?.valueKind === 'multi'">
                    <button type="button"
                      (click)="togglePicker('c' + i + ':val', $event)"
                      [attr.data-testid]="'button-condition-value-' + i"
                      class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 text-left"
                      [ngClass]="(cond.value && $any(cond.value).length) ? 'text-[#0b1516]' : 'text-[#7f9199]'">
                      <span class="flex-1 truncate text-[14px] leading-[1.43]">{{ valueDisplay(cond.value) }}</span>
                      <svg class="h-5 w-5 shrink-0 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 10l5 5 5-5z"/>
                      </svg>
                    </button>
                    <div *ngIf="openPicker() === 'c' + i + ':val'"
                      class="absolute left-0 top-11 z-20 max-h-64 w-full overflow-y-auto rounded-[4px] border border-[#e4eaed] bg-white py-1 shadow-lg"
                      (click)="$event.stopPropagation()">
                      <label *ngFor="let opt of conditionField(cond.fieldKey)?.options"
                        class="flex w-full items-center gap-2 px-3 py-1.5 text-[14px] text-[#0b1516] hover:bg-[#f6f9fb] cursor-pointer">
                        <input type="checkbox"
                          [checked]="$any(cond.value)?.includes(opt)"
                          (change)="toggleConditionMulti(i, opt)"/>
                        {{ opt }}
                      </label>
                    </div>
                  </ng-container>

                  <!-- No field → disabled stub -->
                  <ng-container *ngIf="!cond.fieldKey">
                    <div class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 text-[14px] text-[#7f9199]">
                      Value
                      <svg class="h-5 w-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 10l5 5 5-5z"/>
                      </svg>
                    </div>
                  </ng-container>
                </div>

                <button *ngIf="conditions().length > 1"
                  type="button"
                  (click)="removeCondition(i)"
                  [attr.data-testid]="'button-remove-condition-' + i"
                  class="flex h-9 w-9 shrink-0 items-center justify-center rounded text-[#7f9199] hover:bg-[#f6f9fb] hover:text-[#45565b]"
                  aria-label="Remove condition">
                  <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Dashed vertical connector (20px) -->
            <div class="h-5 w-px border-l border-dashed border-[#b8c6cc]"></div>
          </ng-container>

          <!-- Add condition button — secondary (outlined teal) button -->
          <button type="button"
            (click)="addCondition()"
            data-testid="button-add-condition"
            class="inline-flex h-10 w-10 items-center justify-center rounded-[4px] border border-[#008572] bg-white text-[#008572] transition-colors hover:bg-[rgba(0,133,114,0.08)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#008572] focus-visible:ring-offset-2"
            aria-label="Add condition">
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m7-7H5"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- ===== RIGHT column: THEN actions ===== -->
      <section class="flex min-w-0 flex-1 flex-col items-center gap-5 py-5" data-testid="section-actions">
        <!-- Invisible toggle spacer so headers align with LEFT column -->
        <div class="invisible inline-flex h-6 items-center rounded-[20px] border border-[#e4eaed] p-[2px]">
          <span class="px-2 py-[5px] text-[14px] leading-none">Match All</span>
          <span class="px-2 py-[5px] text-[14px] leading-none">Match Any</span>
        </div>

        <div class="flex items-center gap-2">
          <svg class="h-5 w-5 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
            <path d="M13 2L4 14h7v8l9-12h-7V2z"/>
          </svg>
          <span class="font-body text-[18px] font-medium leading-[1.43] text-[#0b1516]">Then take these actions</span>
        </div>

        <div class="flex w-full flex-col items-center">
          <ng-container *ngFor="let act of actions(); let i = index; trackBy: trackById">
            <div class="relative mb-2 flex w-full flex-col gap-3 rounded-[4px] bg-white p-3"
              [attr.data-testid]="'action-row-' + i">
              <div class="flex items-center gap-3">
                <!-- Parameter -->
                <div class="relative flex-1">
                  <button type="button"
                    (click)="togglePicker('a' + i + ':field', $event)"
                    [attr.data-testid]="'button-action-field-' + i"
                    class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 text-left">
                    <span class="flex-1 truncate text-[14px] leading-[1.43]"
                      [ngClass]="actionField(act.fieldKey)?.label ? 'text-[#0b1516]' : 'text-[#7f9199]'">
                      {{ actionField(act.fieldKey)?.label || 'Parameter' }}
                    </span>
                    <svg class="h-5 w-5 shrink-0 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M7 10l5 5 5-5z"/>
                    </svg>
                  </button>
                  <div *ngIf="openPicker() === 'a' + i + ':field'"
                    class="absolute left-0 top-11 z-20 max-h-64 w-full overflow-y-auto rounded-[4px] border border-[#e4eaed] bg-white py-1 shadow-lg"
                    (click)="$event.stopPropagation()">
                    <button *ngFor="let f of ACTION_FIELDS"
                      type="button"
                      (click)="setActionField(i, f.key)"
                      class="flex w-full items-center px-3 py-1.5 text-left text-[14px] text-[#0b1516] hover:bg-[#f6f9fb]">
                      {{ f.label }}
                    </button>
                  </div>
                </div>

                <!-- Condition (always "is" today but render as real picker for parity) -->
                <div class="relative flex-1">
                  <button type="button"
                    [disabled]="!act.fieldKey"
                    (click)="togglePicker('a' + i + ':op', $event)"
                    [attr.data-testid]="'button-action-op-' + i"
                    class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 text-left disabled:cursor-not-allowed disabled:opacity-50">
                    <span class="flex-1 truncate text-[14px] leading-[1.43]"
                      [ngClass]="act.fieldKey ? 'text-[#0b1516]' : 'text-[#7f9199]'">
                      {{ act.fieldKey ? OPERATORS[act.operator].label : 'Condition' }}
                    </span>
                    <svg class="h-5 w-5 shrink-0 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M7 10l5 5 5-5z"/>
                    </svg>
                  </button>
                  <div *ngIf="openPicker() === 'a' + i + ':op' && act.fieldKey"
                    class="absolute left-0 top-11 z-20 w-full rounded-[4px] border border-[#e4eaed] bg-white py-1 shadow-lg"
                    (click)="$event.stopPropagation()">
                    <button *ngFor="let opKey of actionField(act.fieldKey)?.operators"
                      type="button"
                      (click)="setActionOperator(i, opKey)"
                      class="flex w-full items-center px-3 py-1.5 text-left text-[14px] text-[#0b1516] hover:bg-[#f6f9fb]">
                      {{ OPERATORS[opKey].label }}
                    </button>
                  </div>
                </div>
              </div>

              <!-- Value + remove -->
              <div class="flex items-center gap-2">
                <div class="relative flex-1">
                  <ng-container *ngIf="actionField(act.fieldKey)?.valueKind === 'select'; else actStub">
                    <button type="button"
                      (click)="togglePicker('a' + i + ':val', $event)"
                      [attr.data-testid]="'button-action-value-' + i"
                      class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 text-left">
                      <span class="flex-1 truncate text-[14px] leading-[1.43]"
                        [ngClass]="act.value ? 'text-[#0b1516]' : 'text-[#7f9199]'">{{ valueDisplay(act.value) }}</span>
                      <svg class="h-5 w-5 shrink-0 text-[#45565b]" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 10l5 5 5-5z"/>
                      </svg>
                    </button>
                    <div *ngIf="openPicker() === 'a' + i + ':val'"
                      class="absolute left-0 top-11 z-20 max-h-64 w-full overflow-y-auto rounded-[4px] border border-[#e4eaed] bg-white py-1 shadow-lg"
                      (click)="$event.stopPropagation()">
                      <button *ngFor="let opt of actionField(act.fieldKey)?.options"
                        type="button"
                        (click)="pickActionValue(i, opt)"
                        class="flex w-full items-center px-3 py-1.5 text-left text-[14px] text-[#0b1516] hover:bg-[#f6f9fb]">
                        {{ opt }}
                      </button>
                    </div>
                  </ng-container>
                  <ng-template #actStub>
                    <div class="flex h-10 w-full items-center justify-between gap-2 rounded-[4px] border border-[#e4eaed] bg-white pl-3 pr-2 text-[14px] text-[#7f9199]">
                      Value
                      <svg class="h-5 w-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 10l5 5 5-5z"/>
                      </svg>
                    </div>
                  </ng-template>
                </div>

                <button *ngIf="actions().length > 1"
                  type="button"
                  (click)="removeAction(i)"
                  [attr.data-testid]="'button-remove-action-' + i"
                  class="flex h-9 w-9 shrink-0 items-center justify-center rounded text-[#7f9199] hover:bg-[#f6f9fb] hover:text-[#45565b]"
                  aria-label="Remove action">
                  <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="h-5 w-px border-l border-dashed border-[#b8c6cc]"></div>
          </ng-container>

          <!-- Add action button — secondary (outlined teal) button -->
          <button type="button"
            (click)="addAction()"
            data-testid="button-add-action"
            class="inline-flex h-10 w-10 items-center justify-center rounded-[4px] border border-[#008572] bg-white text-[#008572] transition-colors hover:bg-[rgba(0,133,114,0.08)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#008572] focus-visible:ring-offset-2"
            aria-label="Add action">
            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m7-7H5"/>
            </svg>
          </button>
        </div>
      </section>
    </div>

    <!-- ============ Footer ============ -->
    <footer class="flex items-center justify-end gap-2 border-t border-[#e4eaed] px-6 py-4">
      <button type="button"
        (click)="onCancel()"
        data-testid="button-cancel"
        class="h-9 rounded bg-transparent px-4 text-[14px] font-semibold text-[#0b1516] hover:bg-[#f6f9fb]">
        Cancel
      </button>
      <button type="button"
        (click)="onSave()"
        [disabled]="!canSave()"
        data-testid="button-save"
        class="h-9 rounded bg-[#008572] px-4 text-[14px] font-medium text-white transition-colors hover:bg-[#006e5e] disabled:cursor-not-allowed disabled:opacity-50">
        {{ isEdit() ? 'Save changes' : 'Add Automation rule' }}
      </button>
    </footer>
  </div>
</div>
