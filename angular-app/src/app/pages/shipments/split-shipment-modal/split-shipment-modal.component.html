<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4"
  data-testid="modal-split-shipment"
  (click)="cancel.emit()"
>
  <div
    role="dialog"
    aria-modal="true"
    aria-labelledby="split-shipment-modal-title"
    class="flex max-h-[95vh] w-full max-w-[1324px] flex-col overflow-hidden rounded-lg bg-white"
    style="box-shadow: 0 1px 16px 0 rgba(0,0,0,0.25);"
    (click)="$event.stopPropagation(); closeWarehouseMenus()"
  >
    <!-- Header -->
    <header class="flex shrink-0 items-center justify-between border-b border-[#b8c6cc] px-6 py-4">
      <p id="split-shipment-modal-title" class="font-body text-[18px] font-bold leading-tight text-[#0b1516]" data-testid="text-split-modal-title">
        Split Shipment
      </p>
      <button type="button" aria-label="Close split modal" data-testid="button-close-split-modal"
        (click)="cancel.emit()"
        class="flex h-8 w-8 items-center justify-center rounded-full text-[#324147] hover:bg-neutral-100">
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <!-- Body: 320 left column + flex-1 right area -->
    <div class="flex min-h-0 flex-1 overflow-hidden">

      <!-- Left column: Recommendations -->
      <aside class="flex w-[320px] shrink-0 flex-col overflow-y-auto bg-white" data-testid="column-recommendations">
        <div class="flex flex-col pb-3">
          <button *ngFor="let rec of recommendations.slice(0, 3); let i = index" type="button"
            [attr.data-testid]="'option-' + rec.id"
            (click)="selectRecommendation(rec.id)"
            class="flex items-center gap-4 px-4 transition-colors"
            [ngClass]="i === 0 ? 'pt-4 pb-0.5' : 'py-0.5'">
            <div class="flex flex-1 items-center gap-4 rounded px-4 py-2 transition-colors"
              [ngClass]="selectedRecId() === rec.id
                ? 'border-2 border-[#008572] bg-[#e0f5f0]'
                : 'border-2 border-transparent hover:bg-neutral-50'">
              <!-- ZenShip mark icon -->
              <div class="flex h-6 w-6 shrink-0 items-center justify-center">
                <div class="flex h-5 w-5 items-center justify-center rounded-sm bg-[#008572] text-white">
                  <svg class="h-3 w-3" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2 L2 7 V17 L12 22 L22 17 V7 Z M12 4.5 L19.5 8 L12 11.5 L4.5 8 Z"/>
                  </svg>
                </div>
              </div>
              <div class="flex flex-1 flex-col gap-0.5 text-left">
                <p class="font-body text-base font-bold leading-none text-[#0b1516]">{{ rec.title }}</p>
                <p class="font-body text-xs text-[#5b6b72]">{{ rec.parts }} parts</p>
              </div>
              <div class="flex flex-col gap-1 text-left">
                <p class="font-body text-xs text-[#5b6b72]">Shipping</p>
                <p class="font-body text-sm text-[#0b1516]">${{ rec.shippingCost.toFixed(2) }}</p>
              </div>
            </div>
          </button>
        </div>

        <!-- Divider matching Figma (top border, left-padded) -->
        <div class="border-t border-[#b8c6cc] pl-16"></div>

        <!-- Manual split option -->
        <button type="button"
          data-testid="option-rec-manual"
          (click)="selectRecommendation('rec-manual')"
          class="flex items-center gap-4 px-4 py-0.5 transition-colors">
          <div class="flex flex-1 items-center gap-4 rounded px-4 py-2 transition-colors"
            [ngClass]="selectedRecId() === 'rec-manual'
              ? 'border-2 border-[#008572] bg-[#e0f5f0]'
              : 'border-2 border-transparent hover:bg-neutral-50'">
            <div class="flex h-6 w-6 shrink-0 items-center justify-center text-[#5b6b72]">
              <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h7"/>
              </svg>
            </div>
            <div class="flex flex-1 flex-col gap-0.5 text-left">
              <p class="font-body text-sm font-medium text-[#0b1516]">Manual split</p>
              <p class="font-body text-xs text-[#5b6b72]">Distribute items yourself</p>
            </div>
          </div>
        </button>
      </aside>

      <!-- Right area -->
      <section class="flex flex-1 flex-col overflow-hidden bg-[#f6f9fb] px-5 pb-4">

        <!-- Subheader: copy + Reset -->
        <div class="flex shrink-0 items-center justify-between pt-3">
          <p class="font-body text-sm text-[#5b6b72]" data-testid="text-edit-recommendation-copy">
            You can edit this recommendation by moving items across shipments
          </p>
          <button type="button"
            data-testid="button-reset-split"
            (click)="resetCurrent()"
            class="flex items-center gap-1 rounded border border-[#b8c6cc] bg-white px-2 py-1 font-body text-xs font-bold text-[#0b1516] hover:bg-neutral-50">
            Reset
          </button>
        </div>

        <!-- Shipment cards -->
        <div class="flex flex-1 flex-wrap content-start items-start gap-5 overflow-y-auto pb-5 pt-3"
          data-testid="row-shipment-cards">
          <article *ngFor="let bucket of shipments(); let sIdx = index"
            [attr.data-testid]="'card-shipment-' + (sIdx + 1)"
            class="flex w-[472px] shrink-0 flex-col rounded border border-[#b8c6cc] bg-white">

            <!-- Card Header -->
            <header class="flex items-center gap-2 px-5 py-3">
              <div class="flex flex-1 items-center">
                <p class="font-body text-sm font-bold text-[#0b1516]">Shipment {{ sIdx + 1 }}</p>
              </div>
              <!-- Warehouse picker -->
              <div class="relative">
                <button type="button"
                  [attr.data-testid]="'button-warehouse-' + (sIdx + 1)"
                  (click)="toggleWarehouseMenu(sIdx, $event)"
                  class="flex w-[180px] items-center justify-between rounded border border-[#b8c6cc] bg-white px-3 py-2 font-body text-sm text-[#0b1516] hover:bg-neutral-50">
                  <span class="truncate">{{ bucket.warehouse }}</span>
                  <svg class="h-4 w-4 shrink-0 text-[#5b6b72]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                  </svg>
                </button>
                <ul *ngIf="openWarehouseIdx() === sIdx"
                  [attr.data-testid]="'menu-warehouse-' + (sIdx + 1)"
                  class="absolute right-0 top-full z-20 mt-1 w-[180px] overflow-hidden rounded border border-[#b8c6cc] bg-white shadow-lg"
                  (click)="$event.stopPropagation()">
                  <li *ngFor="let w of warehouseOptions">
                    <button type="button"
                      [attr.data-testid]="'menu-warehouse-' + (sIdx + 1) + '-' + w"
                      (click)="pickWarehouse(sIdx, w, $event)"
                      class="w-full px-3 py-2 text-left font-body text-sm text-[#0b1516] hover:bg-[#f6f9fb]"
                      [class.bg-neutral-100]="w === bucket.warehouse">
                      {{ w }}
                    </button>
                  </li>
                </ul>
              </div>
              <!-- Remove shipment (only when >2) -->
              <button type="button" *ngIf="shipments().length > 2"
                [attr.data-testid]="'button-remove-shipment-' + (sIdx + 1)"
                aria-label="Remove shipment"
                (click)="removeShipment(sIdx)"
                class="flex h-8 w-8 items-center justify-center rounded border border-[#b8c6cc] text-[#5b6b72] hover:bg-neutral-50">
                <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
                </svg>
              </button>
              <!-- Decorative icon mirroring Figma slot (non-interactive) -->
              <div *ngIf="shipments().length <= 2" aria-hidden="true"
                [attr.data-testid]="'icon-shipment-info-' + (sIdx + 1)"
                class="flex h-8 w-8 items-center justify-center rounded border border-[#b8c6cc] text-[#5b6b72]">
                <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
              </div>
            </header>

            <!-- Items table -->
            <div class="flex min-h-[280px] w-full">
              <!-- Checkbox column (52w) -->
              <div class="flex w-[52px] shrink-0 flex-col">
                <div class="flex items-center justify-center border-y border-[#b8c6cc] px-5 py-2">
                  <input type="checkbox"
                    [attr.data-testid]="'check-all-' + (sIdx + 1)"
                    [attr.aria-label]="'Select all items in Shipment ' + (sIdx + 1)"
                    [checked]="isAllSelected(sIdx)"
                    [disabled]="bucket.items.length === 0"
                    (change)="toggleAll(sIdx)"
                    class="h-5 w-5 cursor-pointer rounded border border-[#5b6b72] accent-[#008572]" />
                </div>
                <div *ngFor="let item of bucket.items"
                  class="flex h-[58px] items-center justify-center border-b border-[#e4eaed] px-5">
                  <input type="checkbox"
                    [attr.data-testid]="'check-row-' + (sIdx + 1) + '-' + item.rowKey"
                    [attr.aria-label]="'Select ' + item.sku + ' in Shipment ' + (sIdx + 1)"
                    [checked]="isRowSelected(sIdx, item.rowKey)"
                    (change)="toggleRow(sIdx, item.rowKey)"
                    class="h-5 w-5 cursor-pointer rounded border border-[#5b6b72] accent-[#008572]" />
                </div>
              </div>

              <!-- Product column (340w) -->
              <div class="flex flex-1 flex-col">
                <div class="flex items-center border-y border-[#b8c6cc] p-2">
                  <p class="font-body text-sm font-bold text-[#0b1516]">Product</p>
                </div>
                <div *ngFor="let item of bucket.items"
                  class="flex h-[58px] items-center gap-2.5 border-b border-[#e4eaed] px-2">
                  <svg class="h-4 w-4 shrink-0 text-[#5b6b72]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                  </svg>
                  <div class="flex min-w-0 flex-1 flex-col gap-0.5">
                    <p class="truncate font-body text-sm text-[#0b1516]">{{ item.sku }}</p>
                    <p class="truncate font-body text-xs text-[#5b6b72]">{{ item.name }}</p>
                  </div>
                </div>
                <!-- Empty-state filler row when no items -->
                <div *ngIf="bucket.items.length === 0"
                  [attr.data-testid]="'empty-shipment-' + (sIdx + 1)"
                  class="flex flex-1 items-center justify-center px-2">
                  <p class="font-body text-sm italic text-[#5b6b72]">No items in this shipment</p>
                </div>
              </div>

              <!-- Qty column (80w) -->
              <div class="flex w-[80px] shrink-0 flex-col">
                <div class="flex items-center border-y border-[#b8c6cc] p-2">
                  <p class="font-body text-sm font-bold text-[#0b1516]">Qty</p>
                </div>
                <div *ngFor="let item of bucket.items"
                  class="flex h-[58px] items-start border-b border-[#e4eaed] p-2">
                  <p class="font-body text-sm text-[#0b1516]">{{ item.qty }}</p>
                </div>
              </div>
            </div>

            <!-- Action menu -->
            <div class="flex items-center justify-between border-t border-[#e4eaed] p-3">
              <p class="font-body text-xs text-[#5b6b72]"
                [attr.data-testid]="'text-selected-count-' + (sIdx + 1)">
                {{ selectedCountFor(sIdx) }} products selected
              </p>
              <button type="button"
                [attr.data-testid]="'button-move-' + (sIdx + 1)"
                (click)="moveSelected(sIdx)"
                [disabled]="selectedCountFor(sIdx) === 0"
                class="rounded border border-[#5b6b72] px-4 py-1.5 font-body text-sm font-bold text-[#0b1516] transition-opacity hover:bg-neutral-50 disabled:cursor-not-allowed disabled:opacity-50">
                {{ moveButtonLabel(sIdx) }}
              </button>
            </div>
          </article>

          <!-- Add Shipment -->
          <button type="button"
            data-testid="button-add-shipment"
            (click)="addShipment()"
            class="flex h-10 shrink-0 items-center gap-1 self-start rounded-md border border-[#b8c6cc] bg-white px-3 py-2 font-body text-sm font-bold text-[#0b1516] hover:bg-neutral-50">
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Shipment
          </button>
        </div>
      </section>
    </div>

    <!-- Footer -->
    <footer class="flex shrink-0 items-center justify-end gap-4 border-t border-[#b8c6cc] bg-white px-6 py-4">
      <button type="button" data-testid="button-cancel-split"
        (click)="cancel.emit()"
        class="rounded-md px-3 py-2 font-body text-sm font-bold leading-5 text-[#0b1516] hover:bg-neutral-100">
        Cancel
      </button>
      <button type="button" data-testid="button-confirm-split"
        (click)="onConfirm()"
        [disabled]="!canConfirm()"
        class="rounded-md bg-[#008572] px-3 py-2 font-body text-sm font-bold leading-5 text-white transition-colors hover:bg-[#006A5A] disabled:cursor-not-allowed disabled:bg-[#b8c6cc]">
        Split Shipment
      </button>
    </footer>
  </div>
</div>
