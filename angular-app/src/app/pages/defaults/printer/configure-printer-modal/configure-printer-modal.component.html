<div class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-black/40 p-8"
  (click)="onCancel()"
  data-testid="modal-configure-printer-backdrop">
  <div class="my-auto w-[640px] max-w-[95vw] overflow-hidden rounded-lg bg-surface shadow-[0_1px_16px_rgba(0,0,0,0.25)]"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
    data-testid="modal-configure-printer">

    <header class="flex items-center justify-between border-b border-divider px-5 py-4">
      <div>
        <h2 class="font-body text-[18px] font-semibold leading-[1.43] text-fg-primary"
          data-testid="text-configure-printer-title">
          Configure Printer
        </h2>
        <p class="mt-0.5 text-[12px] text-fg-secondary">{{ printer.name }}</p>
      </div>
      <button type="button"
        (click)="onCancel()"
        aria-label="Close"
        data-testid="button-close-configure-printer"
        class="flex h-8 w-8 items-center justify-center rounded-full text-fg-secondary hover:bg-surface-light-primary">
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <div class="max-h-[70vh] overflow-auto bg-surface-light-primary px-5 py-5">
      <section>
        <h3 class="font-body text-[12px] font-semibold uppercase tracking-[0.06em] text-fg-primary"
          data-testid="section-document-mapping">
          Document Mapping
        </h3>
        <p class="mt-1 text-[12px] leading-[1.4] text-fg-secondary">
          Choose which documents print to this device and in what format.
        </p>

        <div class="mt-4 overflow-hidden rounded-token border border-divider bg-surface">
          <div class="grid items-center border-b border-divider px-3 py-2 text-[12px] font-semibold text-fg-primary"
            style="grid-template-columns: 1fr 120px 120px;">
            <span>Document</span>
            <span>Enabled</span>
            <span>Format</span>
          </div>

          <div *ngFor="let mapping of mappings()"
            class="grid items-center border-b border-divider px-3 py-3 text-[13px] last:border-b-0"
            [attr.data-testid]="'row-mapping-' + mapping.documentType"
            style="grid-template-columns: 1fr 120px 120px;">
            <span>{{ mapping.documentType }}</span>
            <label class="inline-flex items-center gap-2">
              <input type="checkbox"
                [checked]="mapping.enabled"
                (change)="toggleMapping(mapping.documentType, $any($event.target).checked)"
                [attr.data-testid]="'checkbox-mapping-' + mapping.documentType"
                class="h-4 w-4 rounded border-divider text-action-primary focus:ring-action-primary"/>
            </label>
            <select
              [ngModel]="mapping.format"
              (ngModelChange)="setFormat(mapping.documentType, $event)"
              [disabled]="!mapping.enabled"
              [attr.data-testid]="'select-format-' + mapping.documentType"
              class="h-9 rounded-token border border-divider bg-surface px-2 text-[13px] text-fg-primary outline-none focus:border-action-primary disabled:opacity-50">
              <option *ngFor="let format of PRINT_FORMATS" [value]="format">{{ format }}</option>
            </select>
          </div>
        </div>
      </section>

      <section class="mt-6">
        <button type="button"
          (click)="toggleAdvanced()"
          class="flex w-full items-center justify-between rounded-token border border-divider bg-surface px-4 py-3 text-left"
          data-testid="button-toggle-advanced-settings">
          <span class="text-[13px] font-medium text-fg-primary">Advanced Settings</span>
          <svg class="h-4 w-4 text-fg-secondary transition-transform"
            [class.rotate-180]="advancedOpen()"
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
          </svg>
        </button>

        <div *ngIf="advancedOpen()" class="mt-3 grid grid-cols-2 gap-3 rounded-token border border-divider bg-surface p-4"
          data-testid="panel-advanced-settings">
          <label class="col-span-2 flex items-center gap-2">
            <input type="checkbox"
              [ngModel]="silentPrint()"
              (ngModelChange)="silentPrint.set($event)"
              data-testid="checkbox-silent-print"
              class="h-4 w-4 rounded border-divider text-action-primary focus:ring-action-primary"/>
            <span class="text-[13px] text-fg-primary">Silent print (skip browser dialog)</span>
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-[12px] font-medium text-fg-primary">Copies</span>
            <input type="number"
              min="1"
              [ngModel]="copies()"
              (ngModelChange)="copies.set(+$event)"
              data-testid="input-print-copies"
              class="h-10 rounded-token border border-divider bg-surface px-3 text-[13px] outline-none focus:border-action-primary"/>
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-[12px] font-medium text-fg-primary">Orientation</span>
            <select
              [ngModel]="orientation()"
              (ngModelChange)="orientation.set($event)"
              data-testid="select-print-orientation"
              class="h-10 rounded-token border border-divider bg-surface px-3 text-[13px] outline-none focus:border-action-primary">
              <option value="Portrait">Portrait</option>
              <option value="Landscape">Landscape</option>
            </select>
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-[12px] font-medium text-fg-primary">DPI</span>
            <input type="number"
              min="72"
              step="1"
              [ngModel]="dpi()"
              (ngModelChange)="dpi.set(+$event)"
              data-testid="input-print-dpi"
              class="h-10 rounded-token border border-divider bg-surface px-3 text-[13px] outline-none focus:border-action-primary"/>
          </label>

          <label class="flex items-center gap-2 self-end pb-2">
            <input type="checkbox"
              [ngModel]="scaleToFit()"
              (ngModelChange)="scaleToFit.set($event)"
              data-testid="checkbox-scale-to-fit"
              class="h-4 w-4 rounded border-divider text-action-primary focus:ring-action-primary"/>
            <span class="text-[13px] text-fg-primary">Scale to fit page</span>
          </label>
        </div>
      </section>
    </div>

    <footer class="flex items-center justify-between gap-3 border-t border-divider px-5 py-4">
      <button type="button"
        (click)="onTestPrint()"
        data-testid="button-test-print"
        class="h-9 rounded-token border border-divider bg-surface px-4 text-[13px] font-medium text-fg-primary hover:bg-surface-light-primary">
        Test Print
      </button>
      <div class="flex items-center gap-3">
        <button type="button"
          (click)="onCancel()"
          data-testid="button-cancel-configure-printer"
          class="h-9 rounded-token border border-divider bg-surface px-4 text-[13px] font-medium text-fg-primary hover:bg-surface-light-primary">
          Cancel
        </button>
        <button type="button"
          (click)="onSave()"
          data-testid="button-save-configure-printer"
          class="h-9 rounded-token bg-action-primary px-4 text-[13px] font-medium text-fg-on-action hover:bg-action-primary-hover">
          Save
        </button>
      </div>
    </footer>
  </div>
</div>
